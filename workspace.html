<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="6; url=https://choureg.com/">
<title>舊工作台已遷移至 ChouReg 周全企業與合規</title>
<meta name="description" content="舊 ChouLegal 工作台已停止作為獨立入口，企業合規 SaaS 工作台請前往 ChouReg 周全企業與合規。">
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://choureg.com/">
<style>
  :root {
    --paper: #fbfbf8;
    --ink: #17201b;
    --muted: #626c66;
    --line: #d7ddd6;
    --panel: #ffffff;
    --green: #2d7460;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: var(--paper);
    color: var(--ink);
    font-family: "Noto Sans TC", system-ui, sans-serif;
    line-height: 1.7;
  }
  main {
    width: min(780px, 100%);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: clamp(28px, 5vw, 56px);
    background: var(--panel);
    box-shadow: 0 18px 44px rgba(23, 32, 27, 0.1);
  }
  a { color: inherit; text-decoration: none; }
  .eyebrow {
    margin: 0 0 12px;
    color: var(--green);
    font-size: 13px;
    font-weight: 700;
  }
  h1 {
    margin: 0 0 18px;
    font-family: Georgia, "Noto Serif TC", serif;
    font-size: clamp(36px, 7vw, 64px);
    line-height: 1.08;
  }
  p {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 18px;
  }
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 46px;
    border: 1px solid var(--ink);
    border-radius: 8px;
    padding: 0 18px;
    font-weight: 700;
  }
  .btn.primary {
    background: var(--ink);
    color: var(--paper);
  }
</style>
</head>
<body>
<main>
  <p class="eyebrow">Workspace moved to ChouReg</p>
  <h1>舊工作台已遷移至 ChouReg。</h1>
  <p>企業合規、文件中心、HR、店家與營運者工作台，接下來統一由 ChouReg 周全企業與合規承接。ChouLegal 將專注於一般民眾的權益試算與查詢。</p>
  <div class="actions">
    <a class="btn primary" href="https://choureg.com/">前往 ChouReg</a>
    <a class="btn" href="index.html">回 ChouLegal 權益試算與查詢</a>
  </div>
</main>
</body>
</html>
