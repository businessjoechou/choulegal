<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="refresh" content="6; url=https://choulegaledu.com/#library">
<title>法律資料庫已移至 ChouLegal Edu</title>
<meta name="description" content="周全法律大學堂資料庫已移至 ChouLegal Edu，登入後可使用法律 Library、收藏、題庫、課程與學習進度。">
<meta name="robots" content="noindex, follow">
<link rel="canonical" href="https://choulegaledu.com/#library">
<style>
  :root {
    --paper: #fbfbf8;
    --ink: #17201b;
    --muted: #626c66;
    --line: #d7ddd6;
    --panel: #ffffff;
    --blue: #315f82;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: var(--paper);
    color: var(--ink);
    font-family: "Noto Sans TC", system-ui, sans-serif;
    line-height: 1.7;
  }
  main {
    width: min(760px, 100%);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: clamp(28px, 5vw, 56px);
    background: var(--panel);
    box-shadow: 0 18px 44px rgba(23, 32, 27, 0.1);
  }
  a { color: inherit; text-decoration: none; }
  .eyebrow {
    margin: 0 0 12px;
    color: var(--blue);
    font-size: 13px;
    font-weight: 700;
  }
  h1 {
    margin: 0 0 18px;
    font-family: Georgia, "Noto Serif TC", serif;
    font-size: clamp(36px, 7vw, 64px);
    line-height: 1.08;
  }
  p {
    margin: 0 0 24px;
    color: var(--muted);
    font-size: 18px;
  }
  .actions {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 46px;
    border: 1px solid var(--ink);
    border-radius: 8px;
    padding: 0 18px;
    font-weight: 700;
  }
  .btn.primary {
    background: var(--ink);
    color: var(--paper);
  }
</style>
</head>
<body>
<main>
  <p class="eyebrow">Library moved</p>
  <h1>法律資料庫已移至 ChouLegal Edu。</h1>
  <p>資料庫不再放在 ChouLegal 權益試算與查詢站內。請前往 ChouLegal Edu 登入，使用 Library、收藏、題庫、筆記與學習進度。</p>
  <div class="actions">
    <a class="btn primary" href="https://choulegaledu.com/#library">前往 Library</a>
    <a class="btn" href="index.html">回 ChouLegal 權益試算與查詢</a>
  </div>
</main>
</body>
</html>
