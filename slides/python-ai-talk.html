<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<meta name="theme-color" content="#0b1020">
<title>AI 實作與學習程式設計的互依互生 — 成大簡報</title>
<script>
if(location.protocol!=="file:"){try{if(sessionStorage.getItem("ncku_ok")!=="1")location.replace("ncku.html");}catch(e){}}
</script>
<link rel="preload" as="image" href="ncku-v2/slide-01.webp">
<style>
:root{color-scheme:dark;}
*,*::before,*::after{box-sizing:border-box;}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#0b1020;}
body{font-family:system-ui,-apple-system,"Noto Sans TC",sans-serif;color:#fff;-webkit-font-smoothing:antialiased;}
button{font:inherit;}
.deck{position:fixed;inset:0;display:grid;place-items:center;background:#0b1020;touch-action:pan-y;}
.slide{display:block;width:100%;height:100%;object-fit:contain;user-select:none;-webkit-user-drag:none;}
.progress{position:fixed;z-index:4;top:0;left:0;width:100%;height:3px;background:rgba(255,255,255,.12);}
.progress-bar{height:100%;width:0;background:#f5a719;transition:width .22s ease;}
.chrome{position:fixed;z-index:5;inset:auto 0 0;display:flex;align-items:center;justify-content:space-between;padding:28px max(28px,env(safe-area-inset-right)) max(22px,env(safe-area-inset-bottom)) max(28px,env(safe-area-inset-left));pointer-events:none;background:linear-gradient(transparent,rgba(0,0,0,.5));opacity:0;transition:opacity .2s ease;}
body:hover .chrome,.chrome:focus-within,.chrome.visible{opacity:1;}
.counter{font-size:12px;letter-spacing:.16em;color:rgba(255,255,255,.8);text-shadow:0 1px 8px rgba(0,0,0,.7);}
.actions{display:flex;gap:8px;pointer-events:auto;}
.control{display:grid;place-items:center;width:42px;height:42px;border:1px solid rgba(255,255,255,.24);border-radius:50%;background:rgba(11,16,32,.72);color:#fff;cursor:pointer;backdrop-filter:blur(10px);transition:background .2s,border-color .2s,transform .2s;}
.control:hover{background:rgba(245,167,25,.9);border-color:#f5a719;transform:translateY(-1px);}
.control:focus-visible{outline:3px solid #fff;outline-offset:3px;}
.control[disabled]{opacity:.35;cursor:default;transform:none;}
.hit{position:fixed;z-index:2;top:0;bottom:0;width:34%;border:0;background:transparent;cursor:pointer;}
.hit.prev{left:0;cursor:w-resize;}
.hit.next{right:0;cursor:e-resize;}
.hint{position:fixed;z-index:5;left:50%;bottom:max(22px,env(safe-area-inset-bottom));transform:translateX(-50%);padding:8px 13px;border-radius:999px;background:rgba(11,16,32,.72);color:rgba(255,255,255,.72);font-size:11px;letter-spacing:.08em;white-space:nowrap;pointer-events:none;backdrop-filter:blur(10px);animation:hideHint .5s ease 4s forwards;}
@keyframes hideHint{to{opacity:0;visibility:hidden;}}
@media (hover:none){
  .chrome{opacity:1;padding-top:18px;}
  .hint{display:none;}
  .hit{display:none;}
}
@media (prefers-reduced-motion:reduce){
  .progress-bar,.chrome,.control{transition:none;}
  .hint{animation:none;}
}
</style>
</head>
<body>
<main class="deck" id="deck" aria-label="成大簡報">
  <img class="slide" id="slide" src="ncku-v2/slide-01.webp" alt="第 1 頁投影片">
</main>

<div class="progress" aria-hidden="true"><div class="progress-bar" id="bar"></div></div>
<button class="hit prev" id="prevHit" type="button" aria-label="上一頁"></button>
<button class="hit next" id="nextHit" type="button" aria-label="下一頁"></button>

<div class="chrome" id="chrome">
  <div class="counter"><span id="cur">01</span> / <span id="total">33</span></div>
  <div class="actions">
    <button class="control" id="prev" type="button" aria-label="上一頁">←</button>
    <button class="control" id="next" type="button" aria-label="下一頁">→</button>
    <button class="control" id="fullscreen" type="button" aria-label="切換全螢幕">⛶</button>
  </div>
</div>
<div class="hint">← → / 空白鍵翻頁 · F 全螢幕</div>

<script>
(function(){
  var total=33;
  var slide=document.getElementById("slide");
  var bar=document.getElementById("bar");
  var cur=document.getElementById("cur");
  var chrome=document.getElementById("chrome");
  var prevButton=document.getElementById("prev");
  var nextButton=document.getElementById("next");
  var current=0;
  var hideTimer;

  function pad(value){return String(value).padStart(2,"0");}
  function source(index){return "ncku-v2/slide-"+pad(index+1)+".webp";}
  function preload(index){
    if(index<0||index>=total)return;
    var image=new Image();
    image.src=source(index);
  }
  function showChrome(){
    chrome.classList.add("visible");
    clearTimeout(hideTimer);
    hideTimer=setTimeout(function(){chrome.classList.remove("visible");},1800);
  }
  function go(index){
    current=Math.max(0,Math.min(total-1,index));
    slide.src=source(current);
    slide.alt="第 "+(current+1)+" 頁投影片";
    cur.textContent=pad(current+1);
    bar.style.width=((current+1)/total*100)+"%";
    prevButton.disabled=current===0;
    nextButton.disabled=current===total-1;
    history.replaceState(null,"",current?"#"+(current+1):location.pathname+location.search);
    preload(current-1);
    preload(current+1);
    showChrome();
  }
  function next(){go(current+1);}
  function prev(){go(current-1);}
  function toggleFullscreen(){
    if(!document.fullscreenElement){
      document.documentElement.requestFullscreen&&document.documentElement.requestFullscreen();
    }else{
      document.exitFullscreen&&document.exitFullscreen();
    }
  }

  document.getElementById("prevHit").addEventListener("click",prev);
  document.getElementById("nextHit").addEventListener("click",next);
  prevButton.addEventListener("click",prev);
  nextButton.addEventListener("click",next);
  document.getElementById("fullscreen").addEventListener("click",toggleFullscreen);
  document.addEventListener("mousemove",showChrome,{passive:true});
  document.addEventListener("keydown",function(event){
    switch(event.key){
      case "ArrowRight":case "ArrowDown":case " ":case "PageDown":
        event.preventDefault();next();break;
      case "ArrowLeft":case "ArrowUp":case "PageUp":
        event.preventDefault();prev();break;
      case "Home":go(0);break;
      case "End":go(total-1);break;
      case "f":case "F":toggleFullscreen();break;
    }
  });

  var startX=null;
  addEventListener("touchstart",function(event){startX=event.touches[0].clientX;},{passive:true});
  addEventListener("touchend",function(event){
    if(startX===null)return;
    var delta=event.changedTouches[0].clientX-startX;
    if(Math.abs(delta)>50){delta<0?next():prev();}
    startX=null;
  },{passive:true});

  var requested=parseInt((location.hash||"").slice(1),10);
  go(Number.isFinite(requested)?requested-1:0);
})();
</script>
</body>
</html>
